<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - EXPENZO</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #09090B;
      --card-bg: rgba(255, 255, 255, 0.03);
      --primary-grad: linear-gradient(135deg, #6366F1, #8B5CF6);
      --accent-color: #06B6D4;
      --text-primary: #FFFFFF;
      --text-secondary: #94A3B8;
      --input-bg: rgba(15, 23, 42, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --success: #22C55E;
      --error: #EF4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* Immersive Fintech Background */
    .bg-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #1E1B4B 0%, #111827 50%, #09090B 100%);
    }

    /* Glowing Grid */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: 50px 50px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      mask-image: radial-gradient(circle at 50% 40%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at 50% 40%, black 30%, transparent 80%);
      z-index: 2;
    }

    /* Floating Fintech Elements around edges */
    .bg-icon-el {
      position: absolute;
      z-index: 3;
      opacity: 0.16;
      filter: blur(1px) drop-shadow(0 0 15px rgba(99, 102, 241, 0.45));
      pointer-events: none;
      animation: floatIcon 8s infinite ease-in-out;
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
    }

    .el-bank { top: 10%; left: 5%; width: 100px; height: 100px; }
    .el-wallet { top: 45%; left: 4%; width: 90px; height: 90px; animation-delay: -2s; }
    .el-card { bottom: 12%; left: 6%; width: 110px; height: 110px; animation-delay: -4s; }
    .el-coins { bottom: 10%; right: 6%; width: 95px; height: 95px; animation-delay: -1s; }
    .el-safe { top: 48%; right: 4%; width: 100px; height: 100px; animation-delay: -3s; }
    .el-chart-bar { top: 12%; right: 5%; width: 100px; height: 100px; animation-delay: -5s; }

    /* Screen Layout Overlay */
    .screen-overlay {
      position: relative;
      z-index: 20;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 2rem 1.5rem;
    }

    /* Top Branding */
    .branding {
      text-align: center;
      margin-bottom: 1.5rem;
      animation: fadeInDown 0.8s ease-out;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon-wrapper {
      position: relative;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8B5CF6;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }

    .branding-name {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(to right, #FFFFFF, #94A3B8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 0.25rem;
    }

    .branding-tagline {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-top: 0.15rem;
    }

    /* Glassmorphic Card */
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      margin-bottom: 2rem;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Input Grid layout */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      position: relative;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 1.25rem;
      color: var(--text-secondary);
      pointer-events: none;
      width: 18px;
      height: 18px;
      transition: color 0.3s;
    }

    .input-field {
      width: 100%;
      height: 50px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 0 1rem 0 3rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .input-field:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.25);
      background: rgba(15, 23, 42, 0.9);
    }

    .input-field:focus + .input-icon {
      color: var(--accent-color);
    }

    .input-field::placeholder {
      color: #94A3B8;
      transition: transform 0.3s, opacity 0.3s;
    }

    .input-field:focus::placeholder {
      transform: translateY(-4px);
      opacity: 0.5;
    }

    .toggle-pass-btn {
      position: absolute;
      right: 1.25rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }

    /* Avatar Selector */
    .avatar-section {
      margin-bottom: 1.25rem;
    }

    .avatar-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      display: block;
      font-weight: 500;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.4rem;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.02);
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-option svg {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .avatar-option:hover {
      transform: scale(1.15);
      border-color: rgba(6, 182, 212, 0.4);
    }

    .avatar-option.active {
      border-color: var(--accent-color);
      box-shadow: 0 0 12px var(--accent-color);
      transform: scale(1.15);
    }

    /* Checkbox terms */
    .terms-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .checkbox-control {
      accent-color: var(--accent-color);
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .terms-text {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .terms-link {
      color: var(--accent-color);
      text-decoration: none;
    }

    /* Button Primary */
    .btn-primary {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      background: var(--primary-grad);
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
    }

    .btn-primary:active {
      transform: translateY(0) scale(1);
    }

    /* Footer Navigation */
    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .auth-footer-link {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      margin-left: 0.25rem;
      transition: text-shadow 0.2s;
    }

    .auth-footer-link:hover {
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    }

    /* Feedback Alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid transparent;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: var(--error);
    }

    /* Animated Digital Particles */
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 50%;
      opacity: 0.5;
      animation: floatParticle 6s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .auth-card {
        padding: 1.5rem 1.25rem;
      }
      .form-grid {
        grid-template-columns: 1fr;
        gap: 0.85rem;
      }
      .form-group.full-width {
        grid-column: span 1;
      }
      .branding-name {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background Layer Wrapper -->
  <div class="bg-wrapper">
    <div class="bg-grid"></div>
    <div id="particles-container" style="position: absolute; width: 100%; height: 100%; z-index: 2;"></div>

    <!-- 1. Bank Icon (Top-Left) -->
    <div class="bg-icon-el el-bank">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 35 L50 15 L85 35 Z" fill="none" stroke="#06B6D4" stroke-width="4"/>
        <rect x="22" y="42" width="8" height="30" fill="none" stroke="#6366F1" stroke-width="4"/>
        <rect x="38" y="42" width="8" height="30" fill="none" stroke="#6366F1" stroke-width="4"/>
        <rect x="54" y="42" width="8" height="30" fill="none" stroke="#6366F1" stroke-width="4"/>
        <rect x="70" y="42" width="8" height="30" fill="none" stroke="#6366F1" stroke-width="4"/>
        <rect x="10" y="72" width="80" height="10" rx="3" fill="none" stroke="#06B6D4" stroke-width="4"/>
      </svg>
    </div>

    <!-- 2. Wallet Icon (Middle-Left) -->
    <div class="bg-icon-el el-wallet">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="15" y="25" width="70" height="50" rx="8" fill="none" stroke="#6366F1" stroke-width="4"/>
        <path d="M 55 25 L 55 75" stroke="#06B6D4" stroke-width="3" stroke-dasharray="6 4"/>
        <circle cx="70" cy="50" r="7" fill="none" stroke="#6366F1" stroke-width="3"/>
      </svg>
    </div>

    <!-- 3. Credit Card Icon (Bottom-Left) -->
    <div class="bg-icon-el el-card">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="25" width="80" height="50" rx="6" fill="none" stroke="#06B6D4" stroke-width="4"/>
        <rect x="20" y="37" width="16" height="10" fill="#6366F1"/>
        <line x1="20" y1="58" x2="60" y2="58" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>
        <line x1="20" y1="66" x2="40" y2="66" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- 4. Coin Stack Icon (Bottom-Right) -->
    <div class="bg-icon-el el-coins">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="40" rx="28" ry="10" fill="none" stroke="#06B6D4" stroke-width="4"/>
        <path d="M22 40 V52 C22 60 34 62 50 62 C66 62 78 60 78 52 V40" fill="none" stroke="#6366F1" stroke-width="4"/>
        <path d="M22 52 V64 C22 72 34 74 50 74 C66 74 78 72 78 64 V52" fill="none" stroke="#06B6D4" stroke-width="4"/>
        <path d="M22 64 V76 C22 84 34 86 50 86 C66 86 78 84 78 76 V64" fill="none" stroke="#6366F1" stroke-width="4"/>
      </svg>
    </div>

    <!-- 5. Safe Vault Icon (Middle-Right) -->
    <div class="bg-icon-el el-safe">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="60" height="60" rx="8" fill="none" stroke="#6366F1" stroke-width="4"/>
        <circle cx="50" cy="50" r="16" fill="none" stroke="#06B6D4" stroke-width="4"/>
        <line x1="50" y1="34" x2="50" y2="40" stroke="#06B6D4" stroke-width="3"/>
        <line x1="50" y1="60" x2="50" y2="66" stroke="#06B6D4" stroke-width="3"/>
        <line x1="34" y1="50" x2="40" y2="50" stroke="#06B6D4" stroke-width="3"/>
        <line x1="60" y1="50" x2="66" y2="50" stroke="#06B6D4" stroke-width="3"/>
      </svg>
    </div>

    <!-- 6. Bar Chart Icon (Top-Right) -->
    <div class="bg-icon-el el-chart-bar">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="15" y1="85" x2="85" y2="85" stroke="#06B6D4" stroke-width="4" stroke-linecap="round"/>
        <line x1="15" y1="15" x2="15" y2="85" stroke="#06B6D4" stroke-width="4" stroke-linecap="round"/>
        <rect x="25" y="55" width="12" height="30" fill="none" stroke="#6366F1" stroke-width="4"/>
        <rect x="45" y="35" width="12" height="50" fill="none" stroke="#6366F1" stroke-width="4"/>
        <rect x="65" y="20" width="12" height="65" fill="none" stroke="#6366F1" stroke-width="4"/>
      </svg>
    </div>
  </div>

  <!-- Screen Content Overlay -->
  <div class="screen-overlay">
    <!-- Top Branding -->
    <header class="branding">
      <div class="logo-container">
        <h1 class="branding-name">EXPENZO</h1>
        <p class="branding-tagline">Track Smarter. Spend Better. Save More.</p>
      </div>
    </header>

    <!-- Centered Sign Up Card -->
    <main class="auth-card">
      {% if error %}
        <div class="alert alert-error">
          <i data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
          <span>{{ error|linebreaksbr }}</span>
        </div>
      {% endif %}

      <form method="POST" action="{% url 'register' %}" id="register-form">
        {% csrf_token %}
        <input type="hidden" name="avatar_base64" id="avatar-base64-input">
        
        <div class="form-grid">
          <!-- Full Name -->
          <div class="form-group full-width">
            <div class="input-wrapper">
              <input
                type="text"
                name="name"
                class="input-field"
                placeholder="Full Name"
                required
              />
              <i data-lucide="user" class="input-icon"></i>
            </div>
          </div>

          <!-- Username -->
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="text"
                name="username_display"
                class="input-field"
                placeholder="Username"
                required
              />
              <i data-lucide="at-sign" class="input-icon"></i>
            </div>
          </div>

          <!-- Phone Number -->
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="tel"
                name="phone"
                class="input-field"
                placeholder="Phone Number"
                required
              />
              <i data-lucide="phone" class="input-icon"></i>
            </div>
          </div>

          <!-- Email Address -->
          <div class="form-group full-width">
            <div class="input-wrapper">
              <input
                type="email"
                name="email"
                class="input-field"
                placeholder="Email Address"
                required
              />
              <i data-lucide="mail" class="input-icon"></i>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="password"
                name="password"
                id="register-password"
                class="input-field"
                placeholder="Password"
                required
              />
              <i data-lucide="lock" class="input-icon"></i>
              <button type="button" class="toggle-pass-btn" onclick="togglePassword('register-password', this)">
                <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <div class="input-wrapper">
              <input
                type="password"
                name="confirm_password"
                id="register-confirm-password"
                class="input-field"
                placeholder="Confirm"
                required
              />
              <i data-lucide="shield-check" class="input-icon"></i>
              <button type="button" class="toggle-pass-btn" onclick="togglePassword('register-confirm-password', this)">
                <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Predefined Finance Avatars Selection -->
        <div class="avatar-section">
          <span class="avatar-label">Select Finance Avatar</span>
          <div class="avatar-grid">
            <div class="avatar-option" onclick="selectAvatar(0, this)">
              <!-- Avatar 1: Bank Building -->
              <svg viewBox="0 0 100 100">
                <defs>
                  <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#06B6D4"/>
                    <stop offset="50%" stop-color="#6366F1"/>
                    <stop offset="100%" stop-color="#7C3AED"/>
                  </linearGradient>
                </defs>
                <rect width="100" height="100" rx="20" fill="#1C1C1E"/>
                <path d="M20 35 L50 20 L80 35 Z" fill="url(#uiGrad)"/>
                <rect x="22" y="35" width="56" height="5" fill="#6366F1"/>
                <rect x="28" y="40" width="6" height="30" fill="url(#uiGrad)"/>
                <rect x="42" y="40" width="6" height="30" fill="url(#uiGrad)"/>
                <rect x="56" y="40" width="6" height="30" fill="url(#uiGrad)"/>
                <rect x="70" y="40" width="6" height="30" fill="url(#uiGrad)"/>
                <rect x="18" y="70" width="64" height="6" fill="#6366F1"/>
                <rect x="14" y="76" width="72" height="8" fill="url(#uiGrad)"/>
              </svg>
            </div>
            <div class="avatar-option" onclick="selectAvatar(1, this)">
              <!-- Avatar 2: Bitcoin Symbol -->
              <svg viewBox="0 0 100 100">
                <rect width="100" height="100" rx="20" fill="#1C1C1E"/>
                <path d="M 22 54 C 22 66 34 74 50 74 C 66 74 78 66 78 54 L 78 60 C 78 72 66 80 50 80 C 34 80 22 72 22 60 Z" fill="#6366F1"/>
                <ellipse cx="50" cy="54" rx="28" ry="14" fill="#2C2C2E" stroke="url(#uiGrad)" stroke-width="3"/>
                <ellipse cx="50" cy="54" rx="22" ry="11" fill="none" stroke="url(#uiGrad)" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
                <g transform="translate(0, 4) scale(1, 0.7)">
                  <path d="M42 55 h14 c4 0 6.5 2 6.5 5.5 c0 2.5 -1.5 4.5 -4.5 5 c3.5 .5 5 2.5 5 5.5 c0 4 -3.5 6 -7.5 6 h-13.5 Z M48 60 v5 h6 c1.5 0 2.5 -.5 2.5 -2.5 s-1 -2.5 -2.5 -2.5 Z M48 70 v7 h6.5 c1.5 0 2.5 -.5 2.5 -3.5 s-1 -3.5 -2.5 -3.5 Z" fill="url(#uiGrad)"/>
                  <rect x="46" y="47" width="3.5" height="10" fill="url(#uiGrad)" rx="1"/>
                  <rect x="52" y="47" width="3.5" height="10" fill="url(#uiGrad)" rx="1"/>
                  <rect x="46" y="76" width="3.5" height="10" fill="url(#uiGrad)" rx="1"/>
                  <rect x="52" y="76" width="3.5" height="10" fill="url(#uiGrad)" rx="1"/>
                </g>
              </svg>
            </div>
            <div class="avatar-option" onclick="selectAvatar(2, this)">
              <!-- Avatar 3: Stack of Gold Coins -->
              <svg viewBox="0 0 100 100">
                <rect width="100" height="100" rx="20" fill="#1C1C1E"/>
                <path d="M 22 68 C 22 76 34 82 50 82 C 66 82 78 76 78 68 L 78 74 C 78 82 66 88 50 88 C 34 88 22 82 22 74 Z" fill="#7C3AED"/>
                <ellipse cx="50" cy="68" rx="28" ry="10" fill="#2C2C2E" stroke="url(#uiGrad)" stroke-width="2"/>
                <path d="M 22 52 C 22 60 34 66 50 66 C 66 66 78 60 78 52 L 78 58 C 78 66 66 72 50 72 C 34 72 22 66 22 58 Z" fill="#6366F1"/>
                <ellipse cx="50" cy="52" rx="28" ry="10" fill="#2C2C2E" stroke="url(#uiGrad)" stroke-width="2"/>
                <path d="M 22 36 C 22 44 34 50 50 50 C 66 50 78 44 78 36 L 78 42 C 78 50 66 56 50 56 C 34 56 22 50 22 42 Z" fill="url(#uiGrad)"/>
                <ellipse cx="50" cy="36" rx="28" ry="10" fill="#2C2C2E" stroke="url(#uiGrad)" stroke-width="2"/>

        input.type = 'text';
        btn.innerHTML = '<i data-lucide="eye-off" style="width: 18px; height: 18px;"></i>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<i data-lucide="eye" style="width: 18px; height: 18px;"></i>';
      }
      lucide.createIcons();

    function selectAvatar(idx, element) {
      document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('active'));
      element.classList.add('active');
      document.getElementById('avatar-base64-input').value = avatarList[idx];
    }

    // Default select first avatar
    document.addEventListener('DOMContentLoaded', () => {
      const firstAvatar = document.querySelector('.avatar-option');
      if (firstAvatar) selectAvatar(0, firstAvatar);
    });

    // Dynamic Digital Particles Generation
    const particlesContainer = document.getElementById('particles-container');
    const particleCount = 20;
    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDelay = Math.random() * 5 + 's';
      p.style.animationDuration = Math.random() * 4 + 4 + 's';
      particlesContainer.appendChild(p);
    }
